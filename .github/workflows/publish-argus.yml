name: Publish Argus

on:
  push:
    branches:
      - master
  pull_request:

jobs:  
  build-agent:
    name: "Build Agent"
    runs-on: windows-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}
      
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache crates
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build comms library
        run: |
          cd agent_comms
          cargo build --profile release

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Agent
        run: msbuild Agent.sln /p:Configuration=Release
        working-directory: Agent
      
      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent
          path: Agent\bin\x64\Release\Agent.dll

      - name: Upload agent lib
        uses: actions/upload-artifact@v4
        with:
          name: agent-lib
          path: Agent\bin\x64\Release\Agent.lib

  build-profiler:
    name: "Build Argus Profiler"
    runs-on: windows-latest
    needs: build-agent
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}
      
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: agent-lib

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Profiler
        run: msbuild ArgusProfiler.sln /t:ArgusProfiler /p:Configuration=Release
        working-directory: ArgusProfiler
      
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: profiler
          path: ArgusProfiler\x64\Release\ArgusProfiler.dll

  build-service:
    name: "Build Argus Service"
    runs-on: windows-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
            dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore "Service.sln"
        working-directory: Service

      - name: Build Service Solution
        run: dotnet publish Service/Service.csproj -c Release -p:PublishSingleFile=true -p:Version=1.0.${{ github.run_number }} --self-contained true
        working-directory: Service
      
      - name: Upload service artifact
        uses: actions/upload-artifact@v4
        with:
          name: service
          path: Service\Service\bin\x64\Release\net10.0-windows7.0\win-x64\publish\Argus.exe

      - uses: actions/upload-artifact@v4
        with:
          name: service1
          path: Service\Service\bin\x64\Release\net10.0-windows7.0\win-x64\publish\aspnetcorev2_inprocess.dll

      - uses: actions/upload-artifact@v4
        with:
          name: service2
          path: Service\Service\bin\x64\Release\net10.0-windows7.0\win-x64\publish\e_sqlite3.dll
      
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Updater
        run: msbuild Service.sln /t:Updater /p:Configuration=Release
        working-directory: Service
      
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater
          path: Service\Updater\x64\Release\Updater.exe

  build-installer:
    name: "Build Argus Agent Installer"
    runs-on: windows-latest
    needs: [build-agent, build-profiler, build-service]
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: Installer

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
            dotnet-version: '10.x'

      - name: Build MSI
        run: dotnet build .\Installer.wixproj -c Release -p:Platform=x64 -p:BuildVersion=1.0.${{ github.run_number }}
        working-directory: Installer
      
      - name: Sign MSI
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        working-directory: Installer
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "signing_cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_BASE64))
          $signtool = (Get-ChildItem -Recurse -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" | Select-Object -First 1).FullName
          & $signtool sign /f $certPath /p $env:CERT_PASSWORD /t http://timestamp.digicert.com /fd SHA256 /v "Installer\bin\x64\Release\en-US\Argus.msi"
          Remove-Item $certPath
      
      - name: Upload Agent Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: Installer\bin\x64\Release\en-US\Argus.msi

  build-frontend:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies for Frontend
        run: |
          cd Frontend
          npm ci

      - name: Build Frontend
        run: |
          cd Frontend
          npm run build
      
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: Frontend/build
          
  build-backend:
    name: "Build Backend"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        projects:
          - API
          - Controller
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}
      
      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
            dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore "Argus Backend.sln"
        working-directory: Backend

      - name: Build Backend Solution
        run: dotnet build "Argus Backend.sln" -c Release
        working-directory: Backend

      - name: Build ${{ matrix.projects }}
        run: dotnet publish -c Release -r linux-x64 -p:PublishSingleFile=true -p:Version=1.0.${{ github.run_number }} --self-contained true
        working-directory: Backend/${{ matrix.projects }}

      - name: Upload ${{ matrix.projects }} Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.projects }}
          path: Backend/${{ matrix.projects }}/bin/Release/net10.0/linux-x64/publish/${{ matrix.projects }}
          retention-days: 1

  build-deb:
    name: "Build deb installer"
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, build-installer]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5

      - name: Prepare deb tree
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/opt/argus/api
          mkdir -p pkg/opt/argus/controller
          mkdir -p pkg/opt/argus/static
          mkdir -p pkg/etc/nginx/sites-available
          mkdir -p pkg/lib/systemd/system

          # Copy binaries
          cp -r backend-API/* pkg/opt/argus/api/
          cp -r backend-Controller/* pkg/opt/argus/controller/

          # Copy frontend static files
          cp -r frontend/* pkg/opt/argus/static/

          # Copy MSI to static dir
          cp -r installer/Argus.msi pkg/opt/argus/static/

          cat > pkg/etc/nginx/sites-available/argus.conf << 'EOF'
          server {
              listen 80;
              server_name _;

              root /opt/argus/static;
              index index.html;

              location /api/ {
                  proxy_pass         http://127.0.0.1:8443;
                  proxy_http_version 1.1;
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection keep-alive;
              }

              location /_app/ {
                  try_files $uri =404;
              }

              # Serve static HTML
              location / {
                  try_files $uri $uri $uri/ /index.html;
              }
          }
          EOF

          # systemd service for API
          cat > pkg/lib/systemd/system/argus-api.service << 'EOF'
          [Unit]
          Description=Argus API Service
          After=network.target

          [Service]
          WorkingDirectory=/opt/argus/api/
          EnvironmentFile=/etc/argus/argus.env
          ExecStart=/opt/argus/api/API
          Restart=always
          User=argus

          [Install]
          WantedBy=multi-user.target
          EOF

          # systemd service for Controller
          cat > pkg/lib/systemd/system/argus-controller.service << 'EOF'
          [Unit]
          Description=Argus Controller Service
          After=network.target

          [Service]
          WorkingDirectory=/opt/argus/controller
          EnvironmentFile=/etc/argus/argus.env
          ExecStart=/opt/argus/controller/Controller
          Restart=always
          User=argus

          [Install]
          WantedBy=multi-user.target
          EOF

      # deb metadata
      - name: Add deb control and scripts
        run: |
          cat > pkg/DEBIAN/control << 'EOF'
          Package: argus
          Version: 1.0.${{ github.run_number }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Zeroed.Tech <dev@zeroed.tech>
          Depends: nginx, postgresql, adduser
          Description: Argus IIS Monitor
          EOF
          
          cat > pkg/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e

          if ! id -u argus >/dev/null 2>&1; then
            adduser --system --no-create-home --group argus || true
          fi

          mkdir -p /etc/argus
          chmod 750 /etc/argus
          chown argus:argus /etc/argus

          PG_PASS=$(openssl rand -base64 32)
          sudo -u postgres psql <<PGEOF
          DO \$\$
          BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'argus') THEN
                  CREATE ROLE argus LOGIN PASSWORD '${PG_PASS}' CREATEDB NOSUPERUSER NOCREATEROLE;
              ELSE
                  ALTER ROLE argus WITH LOGIN PASSWORD '${PG_PASS}' CREATEDB NOSUPERUSER NOCREATEROLE;
              END IF;
          END
          \$\$;
          PGEOF

          echo "ConnectionStrings__Argus=Host=localhost;Database=Argus;Username=argus;Password=${PG_PASS}" > /etc/argus/argus.env
          chmod 640 /etc/argus/argus.env
          chown argus:argus /etc/argus/argus.env

          chown -R argus:argus /opt/argus
          chown -R argus:argus /opt/argus/api
          chown -R argus:argus /opt/argus/controller

          chmod 750 /opt/argus
          chmod 750 /opt/argus/api/API
          chmod 750 /opt/argus/controller/Controller

          usermod -aG argus www-data || true
          chown -R argus:argus /opt/argus
          find /opt/argus/static -type d -exec chmod 750 {} +
          find /opt/argus/static -type f -exec chmod 640 {} +

          systemctl daemon-reload
          systemctl enable argus-api.service
          systemctl enable argus-controller.service

          systemctl restart argus-api.service
          systemctl restart argus-controller.service

          ln -sf /etc/nginx/sites-available/argus.conf /etc/nginx/sites-enabled/argus.conf
          systemctl restart nginx
          EOF
          chmod 755 pkg/DEBIAN/postinst

          cat > pkg/DEBIAN/prerm << 'EOF'
          #!/bin/bash
          set -e
          if [ "$1" = "remove" ] || [ "$1" = "upgrade" ]; then
              echo "Stopping Argus services..."
              systemctl stop argus-api.service || true
              systemctl stop argus-controller.service || true
          fi
          EOF
          
          chmod 755 pkg/DEBIAN/prerm

          cat > pkg/DEBIAN/postrm << 'EOF'
          #!/bin/bash
          set -e
          if [ "$1" = "remove" ]; then
              echo "Disabling Argus services..."
              systemctl disable argus-api.service || true
              systemctl disable argus-controller.service || true
              rm -f /etc/nginx/sites-enabled/argus.conf
          fi

          if [ "$1" = "purge" ]; then
              # Remove user only on purge
              deluser --system argus 2>/dev/null || true
              delgroup argus 2>/dev/null || true

              rm -rf /etc/argus
              rm -rf /opt/argus
          fi
          EOF
          chmod 755 pkg/DEBIAN/postrm

      - name: Build DEB package
        run: |
          dpkg-deb --build pkg argus_1.0.${{ github.run_number }}_amd64.deb

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: argus-deb
          path: argus_1.0.${{ github.run_number }}_amd64.deb

      - uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            service*
            updater
            profiler
            agent*
            backend*
            frontend
            installer

  deploy:
    name: "Deploy Argus 1.0.${{ github.run_number }}"
    runs-on: self-hosted
    needs: build-deb
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: argus-deb

      - name: Deploy
        run: |
          pwd
          ls -alh
          sudo mv ./argus_1.0.${{ github.run_number }}_amd64.deb /tmp/argus_1.0.${{ github.run_number }}_amd64.deb
          sudo apt install /tmp/argus_1.0.${{ github.run_number }}_amd64.deb
          sudo rm /tmp/argus_1.0.${{ github.run_number }}_amd64.deb
        