name: Publish Argus

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-agent:
    name: "Build Agent"
    runs-on: windows-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache crates
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build comms library
        run: |
          cd agent_comms
          cargo build --profile release

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Agent
        run: msbuild Agent.sln /p:Configuration=Release
        working-directory: Agent

      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent
          path: Agent\bin\x64\Release\Agent.dll
          if-no-files-found: error

      - name: Upload agent lib
        uses: actions/upload-artifact@v4
        with:
          name: agent-lib
          path: Agent\bin\x64\Release\Agent.lib
          if-no-files-found: error

  build-profiler:
    name: "Build Argus Profiler"
    runs-on: windows-latest
    needs: build-agent
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: agent-lib

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Profiler
        run: msbuild ArgusProfiler.sln /t:ArgusProfiler /p:Configuration=Release
        working-directory: ArgusProfiler
      
      - name: Build Hooks Assembly
        run: msbuild ArgusProfiler.sln /t:ArgusHooks /p:Configuration=Release /p:FileVersion=1.0.${{ github.run_number }}
        working-directory: ArgusProfiler

      - name: Stage Artifacts
        working-directory: ArgusProfiler
        shell: pwsh
        run: |
          Copy-Item "ArgusProfiler\x64\Release\ArgusProfiler.dll" -Destination .
          Copy-Item "ArgusProfiler\ArgusHooks\bin\Release\ArgusHooks.dll" -Destination .

      - name: Upload profiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: profiler
          path: |
            ArgusProfiler\ArgusProfiler.dll
            ArgusProfiler\ArgusHooks.dll
          if-no-files-found: error

  build-service:
    name: "Build Argus Service"
    runs-on: windows-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.sln', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"
          cache: true
          cache-dependency-path: "**/*.sln"

      - name: Restore
        run: dotnet restore "Service.sln"
        working-directory: Service

      - name: Build Service Solution
        run: dotnet publish Service/Service.csproj -c ReleaseDev --arch x64 -p:PublishSingleFile=true -p:Version=1.0.${{ github.run_number }} --self-contained true
        working-directory: Service

      - name: Upload service artifact
        uses: actions/upload-artifact@v4
        with:
          name: service
          path: |
            Service\Service\bin\ReleaseDev\net10.0-windows7.0\win-x64\publish\Argus.exe
            Service\Service\bin\ReleaseDev\net10.0-windows7.0\win-x64\publish\aspnetcorev2_inprocess.dll
            Service\Service\bin\ReleaseDev\net10.0-windows7.0\win-x64\publish\e_sqlite3.dll
          if-no-files-found: error

      - name: Add msbuild to PATHS
        uses: microsoft/setup-msbuild@v2

      - name: Build Updater
        run: msbuild Service.sln /t:Updater /p:Configuration=Release
        working-directory: Service

      - name: Upload updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater
          path: Service\Updater\x64\Release\Updater.exe
          if-no-files-found: error

  build-installer:
    name: "Build Argus Agent Installer"
    runs-on: windows-latest
    needs: [build-agent, build-profiler, build-service]
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: Installer

      - name: List Artifacts for Verification
        shell: pwsh
        run: |
          Write-Host "Checking contents of the Installer directory:"
          Get-ChildItem -Path ./Installer -Recurse | Select-Object FullName, Length

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"
          cache: true
          cache-dependency-path: "**/*.sln"

      - name: Build MSI
        run: dotnet build .\Installer.wixproj -c Release -p:Platform=x64 -p:BuildVersion=1.0.${{ github.run_number }}
        working-directory: Installer

      - name: Sign MSI
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        working-directory: Installer
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "signing_cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_BASE64))
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe"
          & $signtool sign /f $certPath /p $env:CERT_PASSWORD /t http://timestamp.digicert.com /fd SHA256 /v "bin\x64\Release\en-US\Argus.msi"
          Remove-Item $certPath

      - name: Upload Agent Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: Installer\bin\x64\Release\en-US\Argus.msi
          if-no-files-found: error

  build-frontend:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies for Frontend
        run: |
          cd Frontend
          npm ci

      - name: Build Frontend
        run: |
          cd Frontend
          npm run build
        env:
          VITE_BUILD_NUMBER: 1.0.${{ github.run_number }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: Frontend/build
          if-no-files-found: error

  build-backend:
    name: "Build Backend"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        projects:
          - API
          - Controller
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.sln', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      - name: Restore
        run: dotnet restore "Argus Backend.sln"
        working-directory: Backend

      - name: Build Backend Solution
        run: dotnet build "Argus Backend.sln" -c Release
        working-directory: Backend

      - name: Build ${{ matrix.projects }}
        run: dotnet publish -c Release -r linux-x64 -p:PublishSingleFile=true -p:Version=1.0.${{ github.run_number }} --self-contained true
        working-directory: Backend/${{ matrix.projects }}

      - name: Upload ${{ matrix.projects }} Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.projects }}
          path: Backend/${{ matrix.projects }}/bin/Release/net10.0/linux-x64/publish/${{ matrix.projects }}
          retention-days: 1
          if-no-files-found: error

  build-deb:
    name: "Build deb installer"
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, build-installer]
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PUBLISH_ACCESS_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v5

      - name: Prepare deb tree
        working-directory: Deb
        run: |
          # Copy binaries
          mkdir -p pkg/opt/argus/api
          mkdir -p pkg/opt/argus/controller
          mkdir -p pkg/opt/argus/static

          cp -r ../backend-API/* pkg/opt/argus/api/
          cp -r ../backend-Controller/* pkg/opt/argus/controller/

          # Copy frontend static files
          cp -r ../frontend/* pkg/opt/argus/static/

          # Copy MSI to static dir
          cp -r ../installer/Argus.msi pkg/opt/argus/static/

      # deb metadata
      - name: Add deb control and scripts
        working-directory: Deb
        run: |
          echo "Version: 1.0.${{ github.run_number }}" >> pkg/DEBIAN/control
          cat pkg/DEBIAN/control

          chmod 755 pkg/DEBIAN/postinst
          chmod 755 pkg/DEBIAN/prerm
          chmod 755 pkg/DEBIAN/postrm

      - name: Build DEB package
        run: |
          dpkg-deb --build pkg argus_1.0.${{ github.run_number }}_amd64.deb
        working-directory: Deb

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: argus-deb
          path: Deb/argus_1.0.${{ github.run_number }}_amd64.deb
          if-no-files-found: error

      - uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            service
            updater
            profiler
            agent*
            backend*
            frontend
            installer

  deploy:
    name: "Deploy Argus 1.0.${{ github.run_number }}"
    runs-on: self-hosted
    needs: build-deb
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: argus-deb

      - name: Deploy
        run: |
          pwd
          ls -alh
          sudo mv ./argus_1.0.${{ github.run_number }}_amd64.deb /tmp/argus_1.0.${{ github.run_number }}_amd64.deb
          sudo apt install /tmp/argus_1.0.${{ github.run_number }}_amd64.deb
          sudo rm /tmp/argus_1.0.${{ github.run_number }}_amd64.deb
